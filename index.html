<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechPack Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        
        // Lucide Icon Component Wrapper
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const [iconSvg, setIconSvg] = useState("");
            React.useEffect(() => {
                if (window.lucide) {
                    const svg = window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // Da wir in einer statischen HTML sind, nutzen wir hier direkt die SVG Pfade oder Lucide-Icons
        // Für die Webversion nutzen wir die i-Tags mit data-lucide
        const LucideIcon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            React.useEffect(() => {
                window.lucide.createIcons();
            });
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: strokeWidth }}></i>;
        };

        const App = () => {
            const [inventory, setInventory] = useState([
                { id: 'inv-1', name: "Sony Alpha 7 IV", category: "Kamera", accessories: [{ id: 'acc-1', name: "Akku NP-FZ100" }, { id: 'acc-2', name: "SD Karte 128GB" }] },
                { id: 'inv-2', name: "DJI Mic 2 Set", category: "Audio", accessories: [{ id: 'acc-3', name: "Lavalier Mikro" }] }
            ]);

            const [jobs, setJobs] = useState([
                { id: 'job-1', name: "Test Dreh", date: new Date().toISOString().split('T')[0], selectedItemIds: ['inv-1'], packingStatus: { 'inv-1': 'fehlt' }, accessoryStatus: { 'inv-1': { 'acc-1': 'fehlt', 'acc-2': 'fehlt' } } }
            ]);

            const [activeTab, setActiveTab] = useState('planer');
            const [activeJobId, setActiveJobId] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [expandedItems, setExpandedItems] = useState({});
            
            const [newItem, setNewItem] = useState({ name: "", category: "Kamera" });
            const [newJob, setNewJob] = useState({ name: "", date: "", items: [] });

            const activeJob = useMemo(() => jobs.find(j => j.id === activeJobId), [jobs, activeJobId]);
            const usageStats = useMemo(() => {
                const stats = {};
                inventory.forEach(item => stats[item.id] = 0);
                jobs.forEach(job => job.selectedItemIds.forEach(id => { if (stats[id] !== undefined) stats[id]++; }));
                return stats;
            }, [jobs, inventory]);

            const togglePackingStatus = (jobId, itemId) => {
                setJobs(jobs.map(job => {
                    if (job.id === jobId) {
                        const order = ["fehlt", "gepackt", "im-einsatz"];
                        const current = job.packingStatus[itemId] || "fehlt";
                        const nextIdx = (order.indexOf(current) + 1) % order.length;
                        return { ...job, packingStatus: { ...job.packingStatus, [itemId]: order[nextIdx] } };
                    }
                    return job;
                }));
            };

            const toggleAccStatus = (jobId, itemId, accId) => {
                setJobs(jobs.map(job => {
                    if (job.id === jobId) {
                        const current = job.accessoryStatus[itemId]?.[accId] || "fehlt";
                        return { ...job, accessoryStatus: { ...job.accessoryStatus, [itemId]: { ...job.accessoryStatus[itemId], [accId]: current === 'gepackt' ? 'fehlt' : 'gepackt' } } };
                    }
                    return job;
                }));
            };

            return (
                <div className="min-h-screen bg-gray-50 text-slate-900 pb-32 font-sans overflow-x-hidden">
                    <header className="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-slate-100 px-6 pt-12 pb-5">
                        <div className="flex justify-between items-center max-w-lg mx-auto">
                            <h1 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                                <LucideIcon name="package" className="text-blue-600" /> TechPack
                            </h1>
                            <div className="bg-slate-100 p-2.5 rounded-full text-slate-400">
                                <LucideIcon name="search" size={20} />
                            </div>
                        </div>
                    </header>

                    <main className="px-4 mt-8 max-w-lg mx-auto">
                        {activeJobId ? (
                            <div className="animate-in slide-in-from-right duration-300">
                                <button onClick={() => setActiveJobId(null)} className="flex items-center gap-2 text-slate-400 font-bold text-xs uppercase mb-6">
                                    <LucideIcon name="arrow-left" size={14} /> Zurück
                                </button>
                                <h2 className="text-2xl font-black mb-1">{activeJob.name}</h2>
                                <p className="text-blue-600 text-sm font-bold mb-8">{new Date(activeJob.date).toLocaleDateString('de-DE')}</p>
                                <div className="space-y-4">
                                    {activeJob.selectedItemIds.map(invId => {
                                        const item = inventory.find(i => i.id === invId);
                                        if (!item) return null;
                                        const status = activeJob.packingStatus[invId] || "fehlt";
                                        const isExpanded = expandedItems[invId];
                                        return (
                                            <div key={invId} className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                                                <div className="p-4 flex items-center gap-4">
                                                    <button onClick={() => togglePackingStatus(activeJob.id, invId)} className={`p-3 rounded-2xl ${status === 'gepackt' ? 'bg-green-100 text-green-600' : status === 'im-einsatz' ? 'bg-purple-100 text-purple-600' : 'bg-slate-100 text-slate-300'}`}>
                                                        <LucideIcon name={status === 'gepackt' ? 'check-circle-2' : status === 'im-einsatz' ? 'zap' : 'circle'} />
                                                    </button>
                                                    <div className="flex-1" onClick={() => setExpandedItems({...expandedItems, [invId]: !isExpanded})}>
                                                        <h4 className={`font-bold ${status === 'gepackt' ? 'text-slate-300 line-through' : ''}`}>{item.name}</h4>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase">{item.category}</p>
                                                    </div>
                                                </div>
                                                {isExpanded && item.accessories.length > 0 && (
                                                    <div className="bg-slate-50 p-4 border-t border-slate-100 space-y-2">
                                                        {item.accessories.map(acc => (
                                                            <div key={acc.id} onClick={() => toggleAccStatus(activeJob.id, invId, acc.id)} className="flex items-center gap-3 p-2 active:bg-white rounded-xl">
                                                                <LucideIcon name={activeJob.accessoryStatus[invId]?.[acc.id] === 'gepackt' ? 'check-circle-2' : 'circle'} size={18} className={activeJob.accessoryStatus[invId]?.[acc.id] === 'gepackt' ? 'text-green-500' : 'text-slate-200'} />
                                                                <span className={`text-sm ${activeJob.accessoryStatus[invId]?.[acc.id] === 'gepackt' ? 'text-slate-300 line-through' : ''}`}>{acc.name}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {activeTab === 'planer' && (
                                    <>
                                        <div className="flex justify-between items-center px-2">
                                            <h2 className="text-xl font-bold">Job Planer</h2>
                                            <button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white p-2 rounded-xl"><LucideIcon name="plus" /></button>
                                        </div>
                                        {jobs.map(job => (
                                            <div key={job.id} onClick={() => setActiveJobId(job.id)} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm active:scale-95 transition-all">
                                                <p className="text-blue-600 text-[10px] font-black uppercase mb-1">{new Date(job.date).toLocaleDateString('de-DE')}</p>
                                                <h3 className="text-lg font-bold mb-4">{job.name}</h3>
                                                <div className="flex justify-between items-center">
                                                    <div className="flex -space-x-2">
                                                        {job.selectedItemIds.slice(0, 3).map(id => <div key={id} className="w-8 h-8 rounded-full bg-slate-100 border-2 border-white flex items-center justify-center text-[10px] font-bold text-slate-400 shadow-sm">{inventory.find(i => i.id === id)?.name.charAt(0)}</div>)}
                                                    </div>
                                                    <LucideIcon name="chevron-right" className="text-slate-200" />
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                )}
                                {activeTab === 'lager' && (
                                    <>
                                        <div className="flex justify-between items-center px-2">
                                            <h2 className="text-xl font-bold">Lager</h2>
                                            <button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white p-2 rounded-xl"><LucideIcon name="plus" /></button>
                                        </div>
                                        {inventory.map(item => (
                                            <div key={item.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 flex justify-between items-center">
                                                <div>
                                                    <p className="text-[10px] font-black text-blue-500 uppercase">{item.category}</p>
                                                    <h3 className="font-bold">{item.name}</h3>
                                                </div>
                                                <span className="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded-full">{usageStats[item.id] || 0} Jobs</span>
                                            </div>
                                        ))}
                                    </>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center py-6 px-8 z-40">
                        <button onClick={() => {setActiveTab('lager'); setActiveJobId(null);}} className={`flex flex-col items-center gap-1 ${activeTab === 'lager' ? 'text-blue-600' : 'text-slate-300'}`}>
                            <LucideIcon name="box" />
                            <span className="text-[10px] font-black">LAGER</span>
                        </button>
                        <button onClick={() => {setActiveTab('planer'); setActiveJobId(null);}} className={`flex flex-col items-center gap-1 ${activeTab === 'planer' ? 'text-blue-600' : 'text-slate-300'}`}>
                            <LucideIcon name="calendar" />
                            <span className="text-[10px] font-black">PLANER</span>
                        </button>
                        <button onClick={() => {setActiveTab('stats'); setActiveJobId(null);}} className={`flex flex-col items-center gap-1 ${activeTab === 'stats' ? 'text-blue-600' : 'text-slate-300'}`}>
                            <LucideIcon name="bar-chart-3" />
                            <span className="text-[10px] font-black">STATS</span>
                        </button>
                    </nav>

                    {showAddModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-end justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-[3rem] p-8 animate-in slide-in-from-bottom duration-300 shadow-2xl">
                                <div className="flex justify-between mb-8">
                                    <h2 className="text-2xl font-black">Hinzufügen</h2>
                                    <button onClick={() => setShowAddModal(false)}><LucideIcon name="x" className="text-slate-300" /></button>
                                </div>
                                <p className="text-center text-slate-400 italic">Hier kannst du neue Items oder Jobs anlegen (siehe Webversion für volles Formular).</p>
                                <button onClick={() => setShowAddModal(false)} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black mt-8">Verstanden</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
