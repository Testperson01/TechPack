<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechPack Pro Max (Cloud Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Firebase SDKs laden -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Firebase für React verfügbar machen
        window.FirebaseDeps = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        
        // Stabiler Wrapper für die Lucide Icons
        const LucideIcon = ({ name, size = 24, strokeWidth = 2, className = "", onClick }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ 
                        root: iconRef.current,
                        attrs: { width: size, height: size, 'stroke-width': strokeWidth }
                    });
                }
            }, [name, size, strokeWidth]);

            return (
                <span 
                    ref={iconRef} 
                    className={`inline-flex items-center justify-center ${className}`} 
                    onClick={onClick}
                    style={{ cursor: onClick ? 'pointer' : 'inherit' }}
                ></span>
            );
        };

        const App = () => {
            // --- THEME STATE ---
            const [isDarkMode, setIsDarkMode] = useState(() => {
                if (typeof window !== 'undefined') {
                    return localStorage.getItem('techpack_theme') === 'dark' || 
                           (!('techpack_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
                }
                return false;
            });

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('techpack_theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('techpack_theme', 'light');
                }
            }, [isDarkMode]);

            // --- SYNC CODE STATE (GERÄTE KOPPELN) ---
            const [syncCode, setSyncCode] = useState(() => {
                if (typeof window !== 'undefined') {
                    const saved = localStorage.getItem('techpack_sync_code');
                    if (saved) return saved;
                    const newCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                    localStorage.setItem('techpack_sync_code', newCode);
                    return newCode;
                }
                return "SYNC00";
            });
            const [tempSyncCode, setTempSyncCode] = useState('');

            // --- CLOUD SYNC STATE ---
            const [user, setUser] = useState(null);
            const [cloudReady, setCloudReady] = useState(false);
            const [syncStatus, setSyncStatus] = useState('connecting'); 
            const [isDataLoaded, setIsDataLoaded] = useState(false);
            const isRemoteUpdate = useRef(false);

            // --- APP STATE ---
            const [categories, setCategories] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [jobs, setJobs] = useState([]);

            const [activeTab, setActiveTab] = useState('planer'); // Intern bleibt es 'planer', im UI 'Jobs'
            const [activeJobId, setActiveJobId] = useState(null);
            const [jobMode, setJobMode] = useState('packen'); // 'packen' oder 'return'
            
            const [showAddModal, setShowAddModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [expandedItems, setExpandedItems] = useState({});
            
            const [expandedCatsLager, setExpandedCatsLager] = useState({});
            const [expandedCatsPlaner, setExpandedCatsPlaner] = useState({});
            const [showCompletedJobs, setShowCompletedJobs] = useState(false); // Toggle für abgeschlossene Jobs

            const [currentDate, setCurrentDate] = useState(new Date());
            const [dialog, setDialog] = useState(null);
            
            // Form States
            const [itemType, setItemType] = useState('item');
            const [formData, setFormData] = useState({ name: "", category: "Kamera", quantity: 1, bundleItems: {}, imageUrl: "" });
            
            const todayStr = new Date().toISOString().split('T')[0];
            const [jobFormData, setJobFormData] = useState({ name: "", startDate: todayStr, endDate: todayStr, items: {} });
            const [newCatName, setNewCatName] = useState("");
            const [newCatParent, setNewCatParent] = useState("");

            // --- STANDARD KATEGORIEN ---
            const DEFAULT_CATEGORIES = [
                'Fokus', 
                'Kabel', 
                'Strom', 
                'Rigging', 
                'Monitoring'
            ];

            // --- 1. FIREBASE INITIALISIERUNG ---
            useEffect(() => {
                const initCloud = async () => {
                    let attempts = 0;
                    while(!window.FirebaseDeps && attempts < 60) { 
                        await new Promise(r => setTimeout(r, 50));
                        attempts++;
                    }

                    if (!window.FirebaseDeps) {
                        setSyncStatus('error');
                        setCategories(DEFAULT_CATEGORIES);
                        setIsDataLoaded(true);
                        return;
                    }

                    const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseDeps;
                    
                    const MY_FIREBASE_CONFIG = {
                      apiKey: "AIzaSyA8Dn_HK1jQc3VHJwOJP0HQSr065wVaeIY",
                      authDomain: "techpack-c0592.firebaseapp.com",
                      projectId: "techpack-c0592",
                      storageBucket: "techpack-c0592.firebasestorage.app",
                      messagingSenderId: "128861299875",
                      appId: "1:128861299875:web:7c829e0db5f0a104214b16",
                      measurementId: "G-6R5SJRJF01"
                    };  
                    
                    let configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                    if (!configStr && MY_FIREBASE_CONFIG) configStr = JSON.stringify(MY_FIREBASE_CONFIG);
                    
                    if (!configStr) {
                        setSyncStatus('no-config');
                        setCategories(DEFAULT_CATEGORIES);
                        setIsDataLoaded(true);
                        return;
                    }

                    try {
                        const config = JSON.parse(configStr);
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        window.db = getFirestore(app);
                        window.appId = typeof __app_id !== 'undefined' ? __app_id : 'techpack-pro';

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setCloudReady(!!u);
                            if(!u) {
                                setSyncStatus('error');
                                setIsDataLoaded(true);
                            }
                        });
                    } catch(e) {
                        setSyncStatus('error');
                        setCategories(DEFAULT_CATEGORIES);
                        setIsDataLoaded(true);
                    }
                };
                initCloud();
            }, []);

            // --- 2. DATEN AUS DER CLOUD LADEN ---
            useEffect(() => {
                if (!cloudReady || !user || !window.db) return;
                const { doc, onSnapshot, setDoc } = window.FirebaseDeps;
                const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'techpack_sync', syncCode);
                
                setSyncStatus('syncing');
                
                const unsub = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        isRemoteUpdate.current = true;
                        const data = snap.data();
                        if (data.categories) setCategories(data.categories);
                        if (data.inventory) setInventory(data.inventory);
                        
                        // Jobs Migration
                        if (data.jobs) {
                            const migratedJobs = data.jobs.map(j => {
                                let start = j.startDate || j.date || todayStr;
                                let end = j.endDate || j.date || todayStr;
                                
                                let newSelected = j.selectedItemIds;
                                if (Array.isArray(newSelected)) {
                                    newSelected = {};
                                    j.selectedItemIds.forEach(id => newSelected[id] = 1);
                                }

                                let newPacking = j.packingStatus || {};
                                let newReturn = j.returnStatus || {};
                                let newAccReturn = j.returnAccessoryStatus || {};
                                
                                Object.keys(newSelected || {}).forEach(id => {
                                    const qty = newSelected[id] || 1;
                                    // Migration für Packing
                                    if (typeof newPacking[id] === 'string') {
                                        newPacking[id] = { packed: (newPacking[id] === 'gepackt' || newPacking[id] === 'im-einsatz') ? qty : 0, status: newPacking[id] };
                                    } else if (!newPacking[id]) {
                                        newPacking[id] = { packed: 0, status: 'fehlt' };
                                    }
                                    // Migration für Return
                                    if (!newReturn[id]) {
                                        newReturn[id] = { returned: 0, status: 'fehlt' };
                                    }
                                });

                                return { 
                                    ...j, 
                                    startDate: start, 
                                    endDate: end, 
                                    selectedItemIds: newSelected || {}, 
                                    packingStatus: newPacking,
                                    returnStatus: newReturn,
                                    returnAccessoryStatus: newAccReturn,
                                    isCompleted: j.isCompleted || false
                                };
                            });
                            setJobs(migratedJobs);
                        } else {
                            setJobs([]);
                        }
                        
                        setSyncStatus('synced');
                        setTimeout(() => { isRemoteUpdate.current = false; }, 100);
                    } else {
                        const initialData = {
                            categories: DEFAULT_CATEGORIES,
                            inventory: [],
                            jobs: []
                        };
                        setDoc(docRef, initialData, { merge: true });
                        setCategories(DEFAULT_CATEGORIES);
                        setInventory([]);
                        setJobs([]);
                    }
                    setIsDataLoaded(true);
                }, (err) => {
                    setSyncStatus('error');
                    setIsDataLoaded(true);
                });
                
                return () => unsub();
            }, [cloudReady, user, syncCode]);

            // --- 3. DATEN IN DIE CLOUD SPEICHERN ---
            useEffect(() => {
                if (!cloudReady || !user || !window.db || !isDataLoaded || isRemoteUpdate.current) return;
                
                const saveTimer = setTimeout(() => {
                    setSyncStatus('syncing');
                    const { doc, setDoc } = window.FirebaseDeps;
                    const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'techpack_sync', syncCode);
                    
                    setDoc(docRef, { categories, inventory, jobs }, { merge: true })
                        .then(() => setSyncStatus('synced'))
                        .catch(() => setSyncStatus('error'));
                }, 500);
                
                return () => clearTimeout(saveTimer);
            }, [categories, inventory, jobs, cloudReady, user, isDataLoaded, syncCode]);

            // --- APP LOGIK & HILFSFUNKTIONEN ---
            const activeJob = useMemo(() => jobs.find(j => j.id === activeJobId), [jobs, activeJobId]);
            
            // Setze Job Mode auf Packen, wenn ein anderer Job geöffnet wird
            useEffect(() => {
                if (activeJobId && activeJob) {
                    setJobMode(activeJob.isCompleted ? 'return' : 'packen');
                }
            }, [activeJobId]);

            const usageStats = useMemo(() => {
                const stats = {};
                inventory.forEach(item => stats[item.id] = 0);
                jobs.forEach(job => {
                    Object.entries(job.selectedItemIds || {}).forEach(([id, qty]) => {
                        if (stats[id] !== undefined) stats[id] += qty;
                    });
                });
                return stats;
            }, [jobs, inventory]);

            const getAvailableQty = (itemId, startStr, endStr) => {
                const item = inventory.find(i => i.id === itemId);
                if (!item || item.isBundle) return 0;
                let used = 0;
                jobs.forEach(j => {
                    // Abgeschlossene Jobs blockieren kein Inventar mehr!
                    if (!j.isCompleted && j.startDate <= endStr && j.endDate >= startStr) {
                        if (j.selectedItemIds[itemId]) {
                            used += j.selectedItemIds[itemId];
                        }
                    }
                });
                return Math.max(0, item.quantity - used);
            };

            const groupedInventoryLager = useMemo(() => {
                const grouped = { 'Bundles': { items: inventory.filter(i => i.isBundle), subs: {} } };
                
                categories.forEach(cat => {
                    const parts = cat.split(' - ');
                    const main = parts[0];
                    if (!grouped[main]) grouped[main] = { items: [], subs: {} };
                    if (parts.length > 1) {
                        const sub = parts[1];
                        if (!grouped[main].subs[sub]) grouped[main].subs[sub] = [];
                    }
                });

                inventory.forEach(item => {
                    if (item.isBundle) return;
                    const cat = item.category || 'Sonstiges';
                    const parts = cat.split(' - ');
                    const main = parts[0];
                    const sub = parts[1];

                    if (!grouped[main]) grouped[main] = { items: [], subs: {} };

                    if (sub) {
                        if (!grouped[main].subs[sub]) grouped[main].subs[sub] = [];
                        grouped[main].subs[sub].push(item);
                    } else {
                        grouped[main].items.push(item);
                    }
                });

                const sonstiges = inventory.filter(i => !i.isBundle && !categories.includes(i.category) && !i.category?.includes(' - '));
                if (sonstiges.length > 0) grouped['Sonstiges'] = { items: sonstiges, subs: {} };
                
                return grouped;
            }, [inventory, categories]);

            const toggleCatLager = (cat) => setExpandedCatsLager(prev => ({...prev, [cat]: !prev[cat]}));
            const toggleCatPlaner = (cat) => setExpandedCatsPlaner(prev => ({...prev, [cat]: !prev[cat]}));

            const confirmDeleteJob = (id) => {
                setDialog({
                    type: 'confirm',
                    message: 'Job wirklich löschen?',
                    onConfirm: () => {
                        setJobs(jobs.filter(j => j.id !== id));
                        if(activeJobId === id) setActiveJobId(null);
                        setDialog(null);
                    }
                });
            };

            const confirmDeleteItem = (id) => {
                setDialog({
                    type: 'confirm',
                    message: 'Item wirklich löschen?',
                    onConfirm: () => {
                        setInventory(inventory.filter(i => i.id !== id));
                        setDialog(null);
                    }
                });
            };

            const saveInventoryItem = (e) => {
                e.preventDefault();
                const isBndl = itemType === 'bundle';
                if (editingItem) {
                    setInventory(inventory.map(item => item.id === editingItem.id ? { ...item, ...formData, isBundle: isBndl } : item));
                    setEditingItem(null);
                } else {
                    setInventory([...inventory, { id: `inv-${Date.now()}`, ...formData, isBundle: isBndl, accessories: [] }]);
                }
                setFormData({ name: "", category: categories[0] || "Sonstiges", quantity: 1, bundleItems: {}, imageUrl: "" });
                setShowAddModal(false);
            };

            const addCategory = () => {
                let fullCat = newCatName;
                if (newCatParent) fullCat = `${newCatParent} - ${newCatName}`;
                
                if (fullCat && !categories.includes(fullCat)) {
                    setCategories([...categories, fullCat]);
                    setExpandedCatsLager(prev => ({...prev, [newCatParent || fullCat]: true}));
                    setExpandedCatsPlaner(prev => ({...prev, [newCatParent || fullCat]: true}));
                    setNewCatName("");
                    setNewCatParent("");
                }
            };

            const deleteCategory = (cat) => {
                setDialog({
                    type: 'confirm',
                    message: `Kategorie '${cat}' wirklich löschen? Die Artikel wandern nach 'Sonstiges'.`,
                    onConfirm: () => {
                        setCategories(categories.filter(c => c !== cat));
                        setDialog(null);
                    }
                });
            };

            const exportPDF = () => {
                if (!window.jspdf || !window.jspdf.jsPDF) {
                    setDialog({ type: 'alert', message: 'PDF-Bibliothek wird noch geladen. Bitte versuche es gleich noch einmal.' });
                    return;
                }
                
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Titel
                doc.setFontSize(22);
                doc.setTextColor(30, 41, 59); // slate-800
                doc.text(`Packliste: ${activeJob.name}`, 14, 22);
                
                // Datum & Meta
                doc.setFontSize(11);
                doc.setTextColor(100, 116, 139); // slate-500
                const startDateStr = new Date(activeJob.startDate).toLocaleDateString('de-DE');
                const endDateStr = new Date(activeJob.endDate).toLocaleDateString('de-DE');
                const dateStr = activeJob.startDate !== activeJob.endDate ? `${startDateStr} bis ${endDateStr}` : startDateStr;
                doc.text(`Zeitraum: ${dateStr}`, 14, 30);
                doc.text(`Exportiert am: ${new Date().toLocaleDateString('de-DE')} ${new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})} Uhr`, 14, 36);
                
                // Tabellen-Daten
                const tableData = [];
                Object.entries(activeJob.selectedItemIds).forEach(([invId, reqQty]) => {
                    const item = inventory.find(i => i.id === invId);
                    if (!item) return;
                    
                    tableData.push([
                        `${reqQty}x`, 
                        item.name, 
                        item.category || 'Sonstiges',
                        '', // Check Out Platzhalter
                        ''  // Check In Platzhalter
                    ]);
                    
                    if (item.accessories && item.accessories.length > 0) {
                        item.accessories.forEach(acc => {
                            tableData.push([
                                `1x`, 
                                `   ↳ ${acc.name}`, 
                                'Zubehör',
                                '',
                                ''
                            ]);
                        });
                    }
                });
                
                // AutoTable generieren
                doc.autoTable({
                    startY: 44,
                    head: [['Menge', 'Artikel', 'Kategorie', 'Out', 'In']],
                    body: tableData,
                    theme: 'grid',
                    headStyles: { fillColor: [37, 99, 235], textColor: 255, fontStyle: 'bold', halign: 'left' }, // blue-600
                    bodyStyles: { textColor: [51, 65, 85] },
                    alternateRowStyles: { fillColor: [248, 250, 252] },
                    columnStyles: {
                        0: { cellWidth: 20, halign: 'center', fontStyle: 'bold' },
                        1: { cellWidth: 'auto', halign: 'left' },
                        2: { cellWidth: 35, textColor: [100, 116, 139], halign: 'left' },
                        3: { cellWidth: 15, halign: 'center' }, // Out Spalte
                        4: { cellWidth: 15, halign: 'center' }  // In Spalte
                    },
                    didDrawCell: function(data) {
                        // Zeichne manuell kleine Checkbox-Quadrate in die Spalten 'Out' (3) und 'In' (4)
                        if ((data.column.index === 3 || data.column.index === 4) && data.section === 'head') {
                             doc.setTextColor(255, 255, 255);
                        }
                        if ((data.column.index === 3 || data.column.index === 4) && data.section === 'body') {
                            doc.setDrawColor(203, 213, 225); // slate-300
                            doc.setLineWidth(0.5);
                            const boxSize = 6;
                            const x = data.cell.x + (data.cell.width / 2) - (boxSize / 2);
                            const y = data.cell.y + (data.cell.height / 2) - (boxSize / 2);
                            doc.rect(x, y, boxSize, boxSize);
                        }
                    },
                    styles: { fontSize: 10, cellPadding: 4 }
                });
                
                // Speichern mit dynamischem Dateinamen
                doc.save(`Packliste_${activeJob.name.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`);
            };

            const addBundleToJob = (bundleItem) => {
                const newItems = { ...jobFormData.items };
                Object.entries(bundleItem.bundleItems || {}).forEach(([bId, bQty]) => {
                    const available = getAvailableQty(bId, jobFormData.startDate, jobFormData.endDate);
                    const currentSelected = newItems[bId] || 0;
                    newItems[bId] = Math.min(available, currentSelected + bQty);
                });
                setJobFormData({ ...jobFormData, items: newItems });
            };

            const createJob = (e) => {
                e.preventDefault();
                if (!jobFormData.name || Object.keys(jobFormData.items).length === 0) return;
                
                const pStatus = {};
                const rStatus = {};
                const aStatus = {};
                const raStatus = {};
                
                Object.keys(jobFormData.items).forEach(invId => {
                    pStatus[invId] = { packed: 0, status: 'fehlt' };
                    rStatus[invId] = { returned: 0, status: 'fehlt' };
                    
                    const invItem = inventory.find(i => i.id === invId);
                    if (invItem && invItem.accessories) {
                        aStatus[invId] = {};
                        raStatus[invId] = {};
                        invItem.accessories.forEach(acc => { 
                            aStatus[invId][acc.id] = 'fehlt'; 
                            raStatus[invId][acc.id] = 'fehlt'; 
                        });
                    }
                });

                if (jobFormData.startDate > jobFormData.endDate) {
                    setDialog({ type: 'alert', message: "Das Startdatum darf nicht nach dem Enddatum liegen." });
                    return;
                }

                setJobs([...jobs, {
                    id: `job-${Date.now()}`,
                    name: jobFormData.name,
                    startDate: jobFormData.startDate,
                    endDate: jobFormData.endDate,
                    selectedItemIds: jobFormData.items,
                    packingStatus: pStatus,
                    returnStatus: rStatus,
                    accessoryStatus: aStatus,
                    returnAccessoryStatus: raStatus,
                    isCompleted: false
                }]);
                setJobFormData({ name: "", startDate: todayStr, endDate: todayStr, items: {} });
                setShowAddModal(false);
            };

            const togglePackingStatus = (jobId, itemId, requiredQty) => {
                setJobs(jobs.map(job => {
                    if (job.id === jobId) {
                        const current = job.packingStatus[itemId] || { packed: 0, status: 'fehlt' };
                        let nextPacked = current.packed;
                        let nextStatus = current.status;

                        if (current.status === 'fehlt' || current.status === 'teilweise') {
                            nextPacked++;
                            if (nextPacked >= requiredQty) {
                                nextPacked = requiredQty;
                                nextStatus = 'gepackt';
                            } else {
                                nextStatus = 'teilweise';
                            }
                        } else if (current.status === 'gepackt') {
                            nextStatus = 'im-einsatz';
                        } else {
                            nextPacked = 0;
                            nextStatus = 'fehlt';
                        }

                        return { ...job, packingStatus: { ...job.packingStatus, [itemId]: { packed: nextPacked, status: nextStatus } } };
                    }
                    return job;
                }));
            };

            const toggleReturnStatus = (jobId, itemId, requiredQty) => {
                setJobs(jobs.map(job => {
                    if (job.id === jobId) {
                        const current = job.returnStatus?.[itemId] || { returned: 0, status: 'fehlt' };
                        let nextReturned = current.returned;
                        let nextStatus = current.status;

                        if (current.status === 'fehlt' || current.status === 'teilweise') {
                            nextReturned++;
                            if (nextReturned >= requiredQty) {
                                nextReturned = requiredQty;
                                nextStatus = 'zurück';
                            } else {
                                nextStatus = 'teilweise';
                            }
                        } else {
                            nextReturned = 0;
                            nextStatus = 'fehlt';
                        }

                        return { ...job, returnStatus: { ...job.returnStatus, [itemId]: { returned: nextReturned, status: nextStatus } } };
                    }
                    return job;
                }));
            };

            const toggleAccStatus = (jobId, itemId, accId) => {
                setJobs(jobs.map(job => {
                    if (job.id === jobId) {
                        const current = job.accessoryStatus[itemId]?.[accId] || "fehlt";
                        return { ...job, accessoryStatus: { ...job.accessoryStatus, [itemId]: { ...job.accessoryStatus[itemId], [accId]: current === 'gepackt' ? 'fehlt' : 'gepackt' } } };
                    }
                    return job;
                }));
            };

            const toggleReturnAccStatus = (jobId, itemId, accId) => {
                setJobs(jobs.map(job => {
                    if (job.id === jobId) {
                        const current = job.returnAccessoryStatus?.[itemId]?.[accId] || "fehlt";
                        const newAccStatus = { ...job.returnAccessoryStatus };
                        if (!newAccStatus[itemId]) newAccStatus[itemId] = {};
                        newAccStatus[itemId][accId] = current === 'zurück' ? 'fehlt' : 'zurück';
                        return { ...job, returnAccessoryStatus: newAccStatus };
                    }
                    return job;
                }));
            };

            const toggleJobCompletion = (jobId) => {
                setJobs(jobs.map(j => j.id === jobId ? { ...j, isCompleted: !j.isCompleted } : j));
                if (activeJob && activeJob.id === jobId && !activeJob.isCompleted) {
                    setDialog({ type: 'alert', message: 'Job abgeschlossen! Das Equipment ist wieder für andere Jobs verfügbar.' });
                }
            };

            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                const padding = firstDay === 0 ? 6 : firstDay - 1;
                for (let i = 0; i < padding; i++) days.push(null);
                for (let d = 1; d <= daysInMonth; d++) days.push(new Date(year, month, d));
                return days;
            }, [currentDate]);

            const getJobsForDate = (date) => {
                if (!date) return [];
                const dStr = date.toISOString().split('T')[0];
                return jobs.filter(j => j.startDate <= dStr && j.endDate >= dStr);
            };

            useEffect(() => {
                if (categories.length > 0 && Object.keys(expandedCatsLager).length === 0) {
                    const initExpanded = { 'Bundles': true, 'Sonstiges': true };
                    categories.forEach(c => initExpanded[c] = true);
                    setExpandedCatsLager(initExpanded);
                    setExpandedCatsPlaner(initExpanded);
                }
            }, [categories]);

            let totalRequiredQty = 0;
            let totalActionQty = 0; // Gepackt oder Zurückgegeben, je nach Modus
            if (activeJob) {
                Object.entries(activeJob.selectedItemIds).forEach(([id, reqQty]) => {
                    totalRequiredQty += reqQty;
                    if (jobMode === 'packen') {
                        const packed = activeJob.packingStatus[id]?.packed || 0;
                        totalActionQty += Math.min(packed, reqQty);
                    } else {
                        const returned = activeJob.returnStatus?.[id]?.returned || 0;
                        totalActionQty += Math.min(returned, reqQty);
                    }
                });
            }
            const progressPercent = totalRequiredQty > 0 ? Math.round((totalActionQty / totalRequiredQty) * 100) : 0;

            if (!isDataLoaded) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 dark:bg-slate-900 text-blue-600 dark:text-blue-400">
                        <LucideIcon name="loader-2" className="animate-spin mb-4" size={40} />
                        <p className="text-sm font-bold text-slate-400 dark:text-slate-500">Verbinde mit TechPack...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 pb-32 font-sans overflow-x-hidden transition-colors duration-200">
                    <header className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-30 border-b border-slate-100 dark:border-slate-800 px-6 pt-12 pb-5 transition-colors duration-200">
                        <div className="flex justify-between items-center max-w-lg mx-auto">
                            <h1 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-2">
                                <LucideIcon name="package" className="text-blue-600 dark:text-blue-400" /> TechPack
                            </h1>
                            <div className="flex gap-2 items-center">
                                <div className="mr-1">
                                    {syncStatus === 'synced' && <LucideIcon name="cloud-check" size={20} className="text-green-500 dark:text-green-400" />}
                                    {syncStatus === 'syncing' && <LucideIcon name="refresh-cw" size={18} className="text-blue-500 dark:text-blue-400 animate-spin" />}
                                    {syncStatus === 'no-config' && <LucideIcon name="cloud-off" size={20} className="text-slate-400 dark:text-slate-500" onClick={() => setDialog({ type: 'alert', message: "Cloud Sync ist inaktiv. Bitte Firebase Config ergänzen." })} />}
                                    {syncStatus === 'error' && <LucideIcon name="alert-triangle" size={20} className="text-red-500 dark:text-red-400" onClick={() => setDialog({ type: 'alert', message: "Fehler bei der Verbindung zur Cloud." })} />}
                                </div>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="bg-slate-100 dark:bg-slate-800 p-2.5 rounded-full text-slate-400 dark:text-slate-400 transition-colors">
                                    <LucideIcon name={isDarkMode ? "sun" : "moon"} size={20} />
                                </button>
                                <button onClick={() => setShowCategoryModal(true)} className="bg-slate-100 dark:bg-slate-800 p-2.5 rounded-full text-slate-400 dark:text-slate-400 transition-colors">
                                    <LucideIcon name="settings" size={20} />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="px-4 mt-8 max-w-lg mx-auto">
                        {activeJobId && activeJob ? (
                            <div className="animate-in slide-in-from-right duration-300">
                                <button onClick={() => setActiveJobId(null)} className="flex items-center gap-2 text-slate-400 dark:text-slate-500 font-bold text-xs uppercase mb-6">
                                    <LucideIcon name="arrow-left" size={14} /> Zurück
                                </button>
                                
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        {activeJob.isCompleted && (
                                            <span className="inline-block bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400 text-[10px] font-black uppercase px-2 py-1 rounded-md mb-2">Abgeschlossen</span>
                                        )}
                                        <h2 className="text-2xl font-black mb-1">{activeJob.name}</h2>
                                        <p className="text-blue-600 dark:text-blue-400 text-sm font-bold">
                                            {new Date(activeJob.startDate).toLocaleDateString('de-DE')} 
                                            {activeJob.startDate !== activeJob.endDate && ` - ${new Date(activeJob.endDate).toLocaleDateString('de-DE')}`}
                                        </p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={exportPDF} title="PDF Packliste herunterladen" className="text-blue-600 dark:text-blue-400 p-2.5 bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-100 dark:hover:bg-blue-900/50 rounded-xl transition-colors"><LucideIcon name="file-down" size={20} /></button>
                                        <button onClick={() => confirmDeleteJob(activeJob.id)} title="Job löschen" className="text-red-400 dark:text-red-500 p-2.5 bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 rounded-xl transition-colors"><LucideIcon name="trash-2" size={20} /></button>
                                    </div>
                                </div>

                                {/* --- PACKEN / RÜCKGABE TOGGLE --- */}
                                <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-2xl mb-8">
                                    <button onClick={() => setJobMode('packen')} className={`flex-1 flex items-center justify-center gap-2 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all ${jobMode === 'packen' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-400 dark:text-slate-500'}`}>
                                        <LucideIcon name="package-open" size={16}/> Check Out
                                    </button>
                                    <button onClick={() => setJobMode('return')} className={`flex-1 flex items-center justify-center gap-2 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all ${jobMode === 'return' ? 'bg-white dark:bg-slate-700 shadow-sm text-purple-600 dark:text-purple-400' : 'text-slate-400 dark:text-slate-500'}`}>
                                        <LucideIcon name="package-check" size={16}/> Check In
                                    </button>
                                </div>

                                {/* --- PROGRESS CARD --- */}
                                <section className={`bg-gradient-to-br rounded-[2.5rem] p-7 text-white shadow-xl mb-8 transition-colors ${jobMode === 'packen' ? 'from-blue-600 to-indigo-700 dark:from-blue-700 dark:to-indigo-800 shadow-blue-200 dark:shadow-none' : 'from-purple-600 to-fuchsia-700 dark:from-purple-700 dark:to-fuchsia-800 shadow-purple-200 dark:shadow-none'}`}>
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <p className="opacity-80 text-xs font-black uppercase tracking-widest mb-1">
                                                {jobMode === 'packen' ? 'Check-Out Fortschritt' : 'Check-In Fortschritt'}
                                            </p>
                                            <h2 className="text-4xl font-black">{progressPercent}%</h2>
                                        </div>
                                        <div className="bg-white/20 p-3 rounded-2xl backdrop-blur-md">
                                            <LucideIcon name={jobMode === 'packen' ? "package" : "check-circle-2"} size={24} />
                                        </div>
                                    </div>
                                    <div className="w-full bg-black/20 h-2.5 rounded-full overflow-hidden">
                                        <div
                                            className="bg-white h-full transition-all duration-1000 ease-out rounded-full"
                                            style={{ width: `${progressPercent}%` }}
                                        />
                                    </div>
                                    <p className="mt-5 text-[10px] font-black opacity-80 uppercase tracking-widest">
                                        {totalActionQty} von {totalRequiredQty} Items {jobMode === 'packen' ? 'ausgecheckt' : 'eingecheckt'}
                                    </p>
                                </section>

                                <div className="space-y-4 mb-8">
                                    {Object.entries(activeJob.selectedItemIds).map(([invId, requiredQty]) => {
                                        const item = inventory.find(i => i.id === invId);
                                        if (!item) return null;
                                        
                                        const packInfo = jobMode === 'packen' 
                                            ? (activeJob.packingStatus[invId] || { packed: 0, status: 'fehlt' })
                                            : (activeJob.returnStatus?.[invId] || { returned: 0, status: 'fehlt' });

                                        const currentCount = jobMode === 'packen' ? packInfo.packed : packInfo.returned;
                                        const isExpanded = expandedItems[invId];
                                        
                                        // Farben für den Status
                                        const btnColor = (packInfo.status === 'gepackt' || packInfo.status === 'zurück') ? 'bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400' : 
                                                         packInfo.status === 'im-einsatz' ? 'bg-indigo-100 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400' : 
                                                         packInfo.status === 'teilweise' ? 'bg-orange-100 text-orange-500 dark:bg-orange-900/30 dark:text-orange-400' :
                                                         'bg-slate-100 text-slate-300 dark:bg-slate-800 dark:text-slate-500';
                                        
                                        const iconName = (packInfo.status === 'gepackt' || packInfo.status === 'zurück') ? 'check-circle-2' : 
                                                         packInfo.status === 'im-einsatz' ? 'zap' : 
                                                         packInfo.status === 'teilweise' ? 'minus-circle' : 'circle';

                                        return (
                                            <div key={invId} className="bg-white dark:bg-slate-800 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm overflow-hidden transition-colors">
                                                <div className="p-4 flex items-center gap-4">
                                                    <button onClick={() => {
                                                        if (jobMode === 'packen') togglePackingStatus(activeJob.id, invId, requiredQty);
                                                        else toggleReturnStatus(activeJob.id, invId, requiredQty);
                                                    }} className={`p-3 rounded-2xl ${btnColor} transition-colors flex-shrink-0`}>
                                                        <LucideIcon name={iconName} />
                                                    </button>
                                                    <div className="w-10 h-10 shrink-0 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 flex items-center justify-center overflow-hidden">
                                                        {item.imageUrl ? <img src={item.imageUrl} alt={item.name} className="w-full h-full object-cover" /> : <LucideIcon name={item.isBundle ? "layers" : "image"} size={18} className="text-slate-400 dark:text-slate-500" />}
                                                    </div>
                                                    <div className="flex-1 min-w-0" onClick={() => setExpandedItems({...expandedItems, [invId]: !isExpanded})}>
                                                        <h4 className={`font-bold truncate ${(packInfo.status === 'gepackt' || packInfo.status === 'zurück') ? 'text-slate-300 dark:text-slate-500 line-through' : 'text-slate-800 dark:text-slate-100'}`}>{item.name}</h4>
                                                        <div className="flex items-center gap-2 mt-0.5">
                                                            <p className="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase">{item.category}</p>
                                                            <span className={`text-[10px] font-black px-1.5 rounded-md ${currentCount === requiredQty ? 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400'}`}>
                                                                {currentCount} / {requiredQty}
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                                {isExpanded && item.accessories && item.accessories.length > 0 && (
                                                    <div className="bg-slate-50 dark:bg-slate-900/50 p-4 border-t border-slate-100 dark:border-slate-700 space-y-2">
                                                        {item.accessories.map(acc => {
                                                            const accStatus = jobMode === 'packen' 
                                                                ? (activeJob.accessoryStatus[invId]?.[acc.id] === 'gepackt')
                                                                : (activeJob.returnAccessoryStatus?.[invId]?.[acc.id] === 'zurück');
                                                            
                                                            return (
                                                                <div key={acc.id} onClick={() => {
                                                                    if(jobMode === 'packen') toggleAccStatus(activeJob.id, invId, acc.id);
                                                                    else toggleReturnAccStatus(activeJob.id, invId, acc.id);
                                                                }} className="flex items-center gap-3 p-2 active:bg-white dark:active:bg-slate-800 rounded-xl transition-colors">
                                                                    <LucideIcon name={accStatus ? 'check-circle-2' : 'circle'} size={18} className={accStatus ? 'text-green-500 dark:text-green-400' : 'text-slate-200 dark:text-slate-600'} />
                                                                    <span className={`text-sm ${accStatus ? 'text-slate-300 dark:text-slate-500 line-through' : 'text-slate-700 dark:text-slate-300'}`}>{acc.name}</span>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* --- JOB ABSCHLIESSEN BUTTON --- */}
                                <div className="pb-8">
                                    {activeJob.isCompleted ? (
                                        <button onClick={() => toggleJobCompletion(activeJob.id)} className="w-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 py-5 rounded-[2rem] font-black mt-4 transition-colors flex items-center justify-center gap-2">
                                            <LucideIcon name="folder-open" size={20}/> Job wieder öffnen
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={() => {
                                                if (progressPercent < 100 && jobMode === 'return') {
                                                    if(confirm('Es sind noch nicht alle Items zurückgecheckt. Job trotzdem abschließen?')) {
                                                        toggleJobCompletion(activeJob.id);
                                                    }
                                                } else {
                                                    toggleJobCompletion(activeJob.id);
                                                }
                                            }} 
                                            className={`w-full text-white py-5 rounded-[2rem] font-black mt-4 shadow-xl transition-colors flex items-center justify-center gap-2 ${jobMode === 'return' && progressPercent === 100 ? 'bg-green-600 hover:bg-green-700 shadow-green-200 dark:shadow-none' : 'bg-slate-800 hover:bg-slate-900 dark:bg-slate-700 dark:hover:bg-slate-600 shadow-slate-300 dark:shadow-none'}`}
                                        >
                                            <LucideIcon name="check-circle-2" size={20}/> Job als abgeschlossen markieren
                                        </button>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {activeTab === 'planer' && (() => {
                                    const pendingJobs = jobs.filter(j => !j.isCompleted).sort((a,b) => new Date(a.startDate) - new Date(b.startDate));
                                    const completedJobs = jobs.filter(j => j.isCompleted).sort((a,b) => new Date(b.endDate) - new Date(a.endDate));

                                    return (
                                        <>
                                            <div className="flex justify-between items-center px-2 mb-2">
                                                <h2 className="text-xl font-bold">Jobs</h2>
                                                <button onClick={() => setShowAddModal(true)} className="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-xl transition-colors"><LucideIcon name="plus" /></button>
                                            </div>
                                            
                                            {/* ANSTEHENDE JOBS */}
                                            {pendingJobs.length > 0 && <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 px-2 mb-4">Anstehende Jobs</h3>}
                                            {pendingJobs.length === 0 && completedJobs.length === 0 && <p className="text-center text-slate-400 dark:text-slate-500 py-10">Keine Jobs geplant.</p>}
                                            {pendingJobs.length === 0 && completedJobs.length > 0 && <p className="text-center text-slate-400 dark:text-slate-500 py-6 italic text-sm">Keine anstehenden Jobs.</p>}
                                            
                                            <div className="space-y-4">
                                                {pendingJobs.map(job => (
                                                    <div key={job.id} onClick={() => setActiveJobId(job.id)} className="bg-white dark:bg-slate-800 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm active:scale-95 transition-all cursor-pointer">
                                                        <p className="text-blue-600 dark:text-blue-400 text-[10px] font-black uppercase mb-1">
                                                            {new Date(job.startDate).toLocaleDateString('de-DE')}
                                                            {job.startDate !== job.endDate && ` - ${new Date(job.endDate).toLocaleDateString('de-DE')}`}
                                                        </p>
                                                        <h3 className="text-lg font-bold mb-4">{job.name}</h3>
                                                        <div className="flex justify-between items-center">
                                                            <div className="flex -space-x-2">
                                                                {Object.keys(job.selectedItemIds).slice(0, 3).map(id => {
                                                                    const invItem = inventory.find(i => i.id === id);
                                                                    return (
                                                                        <div key={id} className="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 border-2 border-white dark:border-slate-800 flex items-center justify-center text-[10px] font-bold text-slate-400 dark:text-slate-300 shadow-sm overflow-hidden">
                                                                            {invItem?.imageUrl ? <img src={invItem.imageUrl} className="w-full h-full object-cover" /> : (invItem?.name?.charAt(0) || '?')}
                                                                        </div>
                                                                    )
                                                                })}
                                                            </div>
                                                            <div className="text-[10px] font-bold text-slate-400 dark:text-slate-500">{Object.keys(job.selectedItemIds).length} Items</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* ABGESCHLOSSENE JOBS */}
                                            {completedJobs.length > 0 && (
                                                <div className="mt-8">
                                                    <button onClick={() => setShowCompletedJobs(!showCompletedJobs)} className="flex items-center justify-between w-full px-2 py-4 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
                                                        <h3 className="text-xs font-black uppercase tracking-widest">Abgeschlossene Jobs ({completedJobs.length})</h3>
                                                        <LucideIcon name={showCompletedJobs ? "chevron-up" : "chevron-down"} size={16} />
                                                    </button>
                                                    
                                                    {showCompletedJobs && (
                                                        <div className="space-y-4 mt-2">
                                                            {completedJobs.map(job => (
                                                                <div key={job.id} onClick={() => setActiveJobId(job.id)} className="bg-slate-50 dark:bg-slate-900/50 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800 active:scale-95 transition-all cursor-pointer opacity-70 hover:opacity-100">
                                                                    <div className="flex justify-between items-start mb-1">
                                                                        <p className="text-slate-500 dark:text-slate-400 text-[10px] font-black uppercase">
                                                                            {new Date(job.startDate).toLocaleDateString('de-DE')}
                                                                            {job.startDate !== job.endDate && ` - ${new Date(job.endDate).toLocaleDateString('de-DE')}`}
                                                                        </p>
                                                                        <LucideIcon name="check-circle-2" size={16} className="text-green-500 dark:text-green-600" />
                                                                    </div>
                                                                    <h3 className="text-lg font-bold mb-4 text-slate-600 dark:text-slate-300 line-through decoration-slate-300 dark:decoration-slate-600">{job.name}</h3>
                                                                    <div className="flex justify-between items-center">
                                                                        <div className="text-[10px] font-bold text-slate-400 dark:text-slate-500">{Object.keys(job.selectedItemIds).length} Items eingecheckt</div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </>
                                    );
                                })()}
                                
                                {activeTab === 'kalender' && (
                                    <div className="space-y-6 animate-in fade-in duration-300">
                                        <div className="flex justify-between items-center px-2">
                                            <h2 className="text-xl font-bold">{currentDate.toLocaleString('de-DE', { month: 'long', year: 'numeric' })}</h2>
                                            <div className="flex gap-2">
                                                <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth()-1)))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-300"><LucideIcon name="chevron-left" size={16} /></button>
                                                <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth()+1)))} className="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-600 dark:text-slate-300"><LucideIcon name="chevron-right" size={16} /></button>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-white dark:bg-slate-800 rounded-[2rem] p-4 shadow-sm border border-slate-100 dark:border-slate-700 transition-colors">
                                            <div className="calendar-grid text-center text-[10px] font-black text-slate-300 dark:text-slate-500 mb-2">
                                                {['MO', 'DI', 'MI', 'DO', 'FR', 'SA', 'SO'].map(d => <div key={d}>{d}</div>)}
                                            </div>
                                            <div className="calendar-grid gap-1">
                                                {calendarDays.map((date, i) => {
                                                    const dateJobs = getJobsForDate(date);
                                                    const isToday = date && date.toDateString() === new Date().toDateString();
                                                    return (
                                                        <div key={i} className={`aspect-square flex flex-col items-center justify-center rounded-xl text-xs relative ${!date ? '' : 'bg-slate-50 dark:bg-slate-900/50'} ${isToday ? 'ring-2 ring-blue-400 dark:ring-blue-500 font-black' : ''}`}>
                                                            {date && date.getDate()}
                                                            {dateJobs.length > 0 && <div className="absolute bottom-1 w-1 h-1 bg-blue-600 dark:bg-blue-400 rounded-full"></div>}
                                                            {dateJobs.length > 0 && date && (
                                                                <button onClick={() => { setActiveJobId(dateJobs[0].id); }} className="absolute inset-0 opacity-0 w-full h-full cursor-pointer"></button>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        <div className="space-y-2 mt-4">
                                            <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase ml-2">Jobs in diesem Monat</h3>
                                            {jobs.filter(j => {
                                                const sMonth = new Date(j.startDate).getMonth();
                                                const eMonth = new Date(j.endDate).getMonth();
                                                const cMonth = currentDate.getMonth();
                                                return cMonth >= sMonth && cMonth <= eMonth;

                                            <div className="flex-1">
                                                <label className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase ml-1">Ende</label>
                                                <input type="date" className="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 rounded-xl p-4 mt-1 font-bold outline-none text-xs dark:text-white" value={jobFormData.endDate} onChange={e => setJobFormData({...jobFormData, endDate: e.target.value})} min={jobFormData.startDate} />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase ml-1 text-blue-600 dark:text-blue-400 mb-2 block">Equipment wählen (Verfügbar)</label>
                                            
                                            {Object.entries(groupedInventoryLager).map(([cat, data]) => {
                                                const hasItems = data.items.length > 0 || Object.values(data.subs).some(subArr => subArr.length > 0);
                                                if (!hasItems) return null;
                                                const isExpanded = expandedCatsPlaner[cat];
                                                
                                                // Helper to render selection item
                                                const renderSelectionItem = (item) => {
                                                    if (item.isBundle) {
                                                        return (
                                                            <div key={item.id} className="p-3 rounded-xl border border-purple-100 dark:border-purple-800 bg-purple-50/30 dark:bg-purple-900/10 flex justify-between items-center mb-2">
                                                                <div className="flex items-center gap-3">
                                                                    <div className="w-8 h-8 shrink-0 rounded-lg bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center overflow-hidden">
                                                                        {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover" /> : <LucideIcon name="layers" size={14} className="text-purple-500 dark:text-purple-400" />}
                                                                    </div>
                                                                    <div className="flex flex-col">
                                                                        <span className="font-bold text-sm dark:text-white">{item.name}</span>
                                                                    </div>
                                                                </div>
                                                                <button type="button" onClick={() => addBundleToJob(item)} className="bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 text-xs font-bold px-3 py-1.5 rounded-lg active:scale-95 transition-transform">
                                                                    Bundle laden
                                                                </button>
                                                            </div>
                                                        );
                                                    } else {
                                                        const available = getAvailableQty(item.id, jobFormData.startDate, jobFormData.endDate);
                                                        const selected = jobFormData.items[item.id] || 0;
                                                        
                                                        return (
                                                            <div key={item.id} className={`p-3 rounded-xl border flex justify-between items-center transition-all mb-2 ${selected > 0 ? 'bg-blue-50 border-blue-200 dark:bg-blue-900/20 dark:border-blue-800' : 'bg-white border-slate-100 dark:bg-slate-800 dark:border-slate-700'}`}>
                                                                <div className="flex items-center gap-3">
                                                                    <div className="w-8 h-8 shrink-0 rounded-lg bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 flex items-center justify-center overflow-hidden">
                                                                        {item.imageUrl ? <img src={item.imageUrl} className="w-full h-full object-cover" /> : <LucideIcon name="image" size={14} className="text-slate-400 dark:text-slate-500" />}
                                                                    </div>
                                                                    <div className="flex flex-col">
                                                                        <span className="font-bold text-sm dark:text-white">{item.name}</span>
                                                                        <span className="text-[9px] font-black uppercase text-slate-400 dark:text-slate-500">Frei: {available}</span>
                                                                    </div>
                                                                </div>
                                                                <div className="flex items-center gap-3">
                                                                    <button type="button" disabled={selected === 0} onClick={() => {
                                                                        const newI = {...jobFormData.items};
                                                                        if (selected > 1) newI[item.id]--; else delete newI[item.id];
                                                                        setJobFormData({...jobFormData, items: newI});
                                                                    }} className="w-7 h-7 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 disabled:opacity-30"><LucideIcon name="minus" size={14}/></button>
                                                                    <span className="font-bold w-4 text-center text-sm dark:text-white">{selected}</span>
                                                                    <button type="button" disabled={selected >= available} onClick={() => {
                                                                        setJobFormData({...jobFormData, items: {...jobFormData.items, [item.id]: selected + 1}});
                                                                    }} className="w-7 h-7 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-blue-600 dark:text-blue-400 disabled:opacity-30"><LucideIcon name="plus" size={14}/></button>
                                                                </div>
                                                            </div>
                                                        );
                                                    }
                                                };

                                                return (
                                                    <div key={cat} className="mb-2">
                                                        <button type="button" onClick={() => toggleCatPlaner(cat)} className="flex items-center justify-between w-full p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-transparent dark:border-slate-800">
                                                            <span className={`text-[10px] font-black uppercase tracking-widest ${cat === 'Bundles' ? 'text-purple-600 dark:text-purple-400' : 'text-slate-500 dark:text-slate-400'}`}>{cat}</span>
                                                            <LucideIcon name={isExpanded ? "chevron-up" : "chevron-down"} size={16} className="text-slate-400 dark:text-slate-500"/>
                                                        </button>
                                                        
                                                        {isExpanded && (
                                                            <div className="mt-2 pl-2 border-l-2 border-slate-100 dark:border-slate-800 ml-2">
                                                                {data.items.map(renderSelectionItem)}
                                                                
                                                                {Object.entries(data.subs).map(([subCat, subItems]) => {
                                                                    if (subItems.length === 0) return null;
                                                                    return (
                                                                        <div key={subCat} className="mt-3">
                                                                            <h4 className="text-[9px] font-black uppercase text-slate-400 dark:text-slate-500 mb-2 pl-1">{subCat}</h4>
                                                                            {subItems.map(renderSelectionItem)}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-[2rem] font-black mt-4 shadow-xl shadow-blue-100 dark:shadow-none disabled:opacity-50 transition-colors" disabled={!jobFormData.name || Object.keys(jobFormData.items).length === 0}>Job Verbindlich Planen</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* --- CUSTOM DIALOG --- */}
                    {dialog && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/60 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 transition-colors">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-in zoom-in-95 duration-200 border border-transparent dark:border-slate-700">
                                <h3 className="text-lg font-black text-slate-800 dark:text-white mb-2">{dialog.type === 'confirm' ? 'Bitte bestätigen' : 'Hinweis'}</h3>
                                <p className="text-sm text-slate-600 dark:text-slate-300 mb-6">{dialog.message}</p>
                                <div className="flex gap-3 justify-end">
                                    {dialog.type === 'confirm' && (
                                        <button onClick={() => setDialog(null)} className="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 active:bg-slate-200 dark:active:bg-slate-600 transition-colors">Abbrechen</button>
                                    )}
                                    <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); else setDialog(null); }} className="px-5 py-2.5 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors">OK</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
